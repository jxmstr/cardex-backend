/* Robust loader: load React, ReactDOM, Babel; if unpkg fails, fall back to jsdelivr/cdnjs. */
function loadScript(urls, cb){
  var i=0;
  function tryNext(){
    if(i>=urls.length){ cb(new Error("all CDNs failed for "+urls[0])); return; }
    var sc=document.createElement('script');
    sc.src=urls[i++];
    sc.crossOrigin="anonymous";
    sc.onload=function(){ cb(null); };
    sc.onerror=function(){ tryNext(); };
    document.head.appendChild(sc);
  }
  tryNext();
}
window.__cardexReady=new Promise(function(resolve,reject){
  loadScript([
    "https://unpkg.com/react@18/umd/react.production.min.js",
    "https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js",
    "https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"
  ], function(e){
    if(e){reject(e);return;}
    loadScript([
      "https://unpkg.com/react-dom@18/umd/react-dom.production.min.js",
      "https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js",

    ], function(e2){

        "https://unpkg.com/@babel/standalone/babel.min.js",
        "https://cdn.jsdelivr.net/npm/@babel/standalone/babel.min.js",
        "https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"
      ], function(e3){ if(e3){reject(e3);return;} resolve(); });
    });
  });
});

const GRADES=["Raw","PSA 8","PSA 9","PSA 10","BGS 9.5","CGC 9.5"];
const RARITY={SEC:"#e8843c",L:"#d4a84b",SR:"#b48ce0",R:"#5b8def",UC:"#5e6975",C:"#5e6975",P:"#e0708a",SP:"#e8843c","SP CARD":"#e8843c",DON:"#7a8696"};
const fx=0.79;
const money=(n,c)=> n==null?"—":(c==="GBP"?"£":"$")+Number(n).toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2});
const pctTxt=n=> n==null?"—":(n>=0?"+":"")+Number(n).toFixed(2)+"%";
const pctCol=n=> n==null?C.mute:Number(n)>=0?C.up:C.down;
const seeded=s=>{let x=s||1;return()=>{x=(x*1664525+1013904223)&0xffffffff;return(x>>>0)/0xffffffff;};};

const SET_AGE={"OP-01":40,"OP-02":36,"OP-03":31,"OP-04":27,"OP-05":23,"OP-06":19,"OP-07":15,"OP-08":12,"OP-09":9,"OP-10":7,"OP-11":4,"OP-12":2,"PRB-01":6,"EB-01":14,"EB-02":5,"ST-13":30,"ST-21":3};
const REPRINT_SETS=new Set(["PRB-01","EB-01","EB-02"]);

/* Cardex is one website: the dashboard and the API live at the same URL.
   API calls use relative paths (/api/...), so there is nothing to configure. */
const BACKEND="";            /* same-origin: calls go to /api/... on this site */
const FEEDS_CONNECTED=true;  /* the backend ships with this site */

function parseSet(setName,fileCode){
  let code=(fileCode||"").toUpperCase().replace(/^(OP|ST|EB|PRB)/,"$1-");
  const m=(setName||"").match(/\[([A-Z]+-?\d+)\]/);
  if(m) code=m[1].replace(/^(OP|ST|EB|PRB)-?/,"$1-");
  let name=(setName||"").replace(/\[[^\]]*\]/g,"").replace(/-/g," ").replace(/\s+/g," ").trim().replace(/\b\w/g,ch=>ch.toUpperCase());
  if(!name||/^op\s*\d+$/i.test(name)) name=code;
  return {code,name};
}
const ICONIC=/luffy|zoro|ace|shanks|law|yamato|nami|sabo|katakuri|roger|rayleigh|kid|doflamingo|teach|hancock|kaido|whitebeard|sanji|robin|chopper/i;
const META_LEADERS=/luffy|zoro|law|kid|doflamingo|katakuri|nami|sakazuki|teach|garp|whitebeard|kaido|enel|gecko|moria/i;

function scoreCard(c,pricing){
  const r=c.rarity;
  const scarcity=r==="SEC"?1:(r==="SP CARD"||r==="SP")?0.95:r==="L"?0.5:r==="SR"?0.55:r==="P"?0.6:r==="R"?0.25:0.1;
  const alt=/\bp\d|alt|parallel|manga|special/i.test(c.id+c.name)?0.15:0;
  const meta=(c.type==="Leader"?(META_LEADERS.test(c.name)?1:0.55):0)+(META_LEADERS.test(c.name)?0.4:0);
  const metaN=Math.min(1,meta);
  const ageM=SET_AGE[c.setCode]??12;
  const age=Math.min(1,ageM/40);
  const reprintRisk=REPRINT_SETS.has(c.setCode)?0.6:0.15;
  const gradeUpside=(r==="SEC"||r==="L"||r==="SP CARD")?0.9:r==="SR"?0.55:0.3;
  const iconic=ICONIC.test(c.name)?1:0.3;
  const momentum=pricing?Math.max(0,Math.min(1,0.5+(pricing.ch30||0)/40)):0.5;
  const liquidity=pricing?Math.max(0,Math.min(1,(pricing.vol30||0)/40)):0.5;
  const sc=Math.min(1,scarcity+alt);
  const short=100*(0.34*momentum+0.28*liquidity+0.22*metaN+0.16*sc);
  const med=100*(0.30*metaN+0.26*sc+0.18*gradeUpside+0.14*momentum+0.12*(1-reprintRisk));
  const long=100*(0.30*sc+0.24*age+0.20*gradeUpside+0.16*iconic+0.10*(1-reprintRisk));
  const R=v=>Math.round(v);
  return {short:R(short),med:R(med),long:R(long),factors:{scarcity:sc,meta:metaN,age,gradeUpside,iconic,reprintRisk,momentum,liquidity}};
}
function rating(s){return s>=78?"Strong Buy":s>=64?"Buy":s>=50?"Watch":s>=36?"Hold":"Avoid";}
function ratingColor(s){return s>=78?C.up:s>=64?"#5fb87a":s>=50?C.gold:s>=36?C.sub:C.down;}

function buildCatalog(){
  const seen=new Set(),out=[];const rand=seeded(RAW_CARDS.length||1);
  for(const c of RAW_CARDS){
    const id=c.id;if(!id||seen.has(id))continue;seen.add(id);
    const set=parseSet(c.s,c.f);const rarity=(c.r||"C").toUpperCase().trim();
    const card={id,name:(c.n||"Unknown").trim(),rarity,color:c.co||"",type:(c.t||"Character").replace(/\b\w/g,x=>x.toUpperCase()),setCode:set.code,setName:set.name,cost:c.cs??"",power:c.pw??"",family:c.fm||"",attribute:c.at||"",ability:c.ab||"",
      image: "/api/image?id="+id,   /* same-site image proxy */
      altImage:"https://static.dotgg.gg/onepiece/cards/"+id+".webp",
      ageM:SET_AGE[set.code]??12};
    card.score=scoreCard(card,null);
    out.push(card);
  }
  return out;
}
function shapeHistory(card,grade){
  const rand=seeded([...card.id].reduce((a,c)=>a+c.charCodeAt(0),0)+grade.length);
  return [...Array(24)].map((_,i)=>{const d=new Date(2026,5,13-(23-i)*1.2);return{d:d.toLocaleDateString("en-GB",{day:"2-digit",month:"short"}),v:0.6+0.4*Math.sin(i/3)+(rand()-0.5)*0.15+i*0.01};});
}

function CardImg({card,style,contain}){
  const [src,setSrc]=useState(card.image);const[stage,setStage]=useState(0);const[failed,setFailed]=useState(false);
  useEffect(()=>{setSrc(card.image);setStage(0);setFailed(false);},[card.id]);
  const onErr=()=>{stage===0?(setSrc(card.altImage),setStage(1)):setFailed(true);};
  if(failed)return(<div style={{...style,display:"flex",alignItems:"center",justifyContent:"center",background:"linear-gradient(135deg,#161b21,#0a0c0f)",color:C.mute,flexDirection:"column",gap:5}}><span style={{fontSize:22,opacity:0.5}}>◈</span><span style={{fontSize:9,fontWeight:600}}>{card.id}</span></div>);
  return <img src={src} alt={card.name} onError={onErr} referrerPolicy="no-referrer" loading="lazy" style={{...style,objectFit:contain?"contain":"cover"}}/>;
}

class ErrorBoundary extends React.Component{
  constructor(p){super(p);this.state={err:null};}
  static getDerivedStateFromError(e){return {err:e};}
  componentDidCatch(e,info){console.error("Cardex error:",e,info);}
  render(){
    if(this.state.err){
      return React.createElement("div",{style:{padding:"30px",fontFamily:"system-ui",color:"#eaf0f6",background:"#0a0c0f",minHeight:"100vh"}},
        React.createElement("h2",{style:{color:"#e2615a"}},"Something errored on this screen"),
        React.createElement("p",{style:{color:"#9aa6b4"}},"The rest of the app is fine — this tells us what to fix:"),
        React.createElement("pre",{style:{whiteSpace:"pre-wrap",background:"#11151a",padding:"14px",borderRadius:8,fontSize:12,color:"#e2615a"}},String(this.state.err&&this.state.err.stack||this.state.err)),
        React.createElement("button",{onClick:()=>location.reload(),style:{marginTop:12,padding:"10px 18px",borderRadius:8,border:"none",background:"#5b8def",color:"#fff",fontWeight:600,cursor:"pointer"}},"Reload")
      );
    }
    return this.props.children;
  }
}

function App(){
  const [view,setView]=useState("dashboard");
  const [cur,setCur]=useState("USD");
  const catalog=useMemo(()=>buildCatalog(),[]);
  const [sel,setSel]=useState(null);
  const [activeSet,setActiveSet]=useState(null);
  const [hold,setHold]=useState([]);
  const open=c=>{setSel(c);setView("card");window.scrollTo(0,0);};
  const openSet=code=>{setActiveSet(code);setView("setDetail");window.scrollTo(0,0);};
  const add=card=>setHold(p=>p.find(x=>x.id===card.id)?p:[...p,card]);
  const remove=id=>setHold(p=>p.filter(x=>x.id!==id));
  return (<div style={{minHeight:"100vh"}}>
    <TopNav view={view} setView={setView} cur={cur} setCur={setCur} count={catalog.length}/>

      {tab==="thesis"&&<Thesis card={card}/>}
      {tab==="pricing"&&<PricingTab grade={grade} setGrade={setGrade} market={market} setMarket={setMarket} pricing={pricing} loadingP={loadingP}/>}
      {tab==="listings"&&<ListingsTab pricing={pricing} loadingP={loadingP}/>}
      {tab==="sold"&&<SoldTab sold={sold} loadingS={loadingS}/>}
      {tab==="chart"&&<ChartTab hist={hist} grade={grade} setGrade={setGrade}/>}
    </div>
  </div>);
}
function Thesis({card}){
  const f=card.score.factors;
  const rows=[["Scarcity / rarity",f.scarcity,card.rarity+" — "+(card.rarity==="SEC"?"secret rare, lowest pull rate":card.rarity==="L"?"leader, fixed demand":card.rarity==="SR"?"super rare":"common print")],["Meta relevance",f.meta,f.meta>0.6?"Tournament-relevant character/leader":f.meta>0.3?"Situational play":"Low competitive demand"],["Set age / sell-through",f.age,card.ageM+" months old — "+(f.age>0.6?"well into scarcity phase":f.age>0.3?"maturing":"freshly printed, supply high")],["Grade upside",f.gradeUpside,f.gradeUpside>0.7?"High graded premium potential (PSA 10 multiple)":f.gradeUpside>0.4?"Moderate graded premium":"Limited grading upside"],["Iconic status",f.iconic,f.iconic>0.7?"Top-tier character — durable long-term demand":"Secondary character"],["Reprint risk",1-f.reprintRisk,f.reprintRisk>0.4?"⚠ In a reprint/anthology set — supply can expand":"Original print — supply fixed"]];
  return (<div><div style={{border:"1px solid "+C.line,borderRadius:12,overflow:"hidden"}}>{rows.map(([label,val,note],i)=><div key={label} style={{padding:"14px 16px",borderTop:i?"1px solid "+C.line:"none",background:C.panel}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:14,fontWeight:600}}>{label}</span><span className="mono" style={{fontSize:13,color:C.sub}}>{Math.round(val*100)}/100</span></div><div style={{height:5,borderRadius:3,background:C.line,overflow:"hidden",marginBottom:7}}><div style={{width:val*100+"%",height:"100%",background:val>0.6?C.up:val>0.35?C.gold:C.down}}></div></div><div style={{fontSize:12,color:C.mute,lineHeight:1.4}}>{note}</div></div>)}</div><div style={{marginTop:14,fontSize:12,color:C.mute,lineHeight:1.5}}>Scores blend these fundamentals per horizon. Price momentum &amp; liquidity factors are currently neutral and switch on when feeds connect.</div></div>);
}
function PricingTab({grade,setGrade,market,setMarket,pricing,loadingP}){
  if(loadingP)return <div style={{padding:"40px",textAlign:"center",color:C.sub}}>Loading live eBay prices…</div>;
  const bg=(pricing&&pricing.byGrade)||[];
  if(!bg.length)return <div style={{padding:"40px 24px",textAlign:"center",border:"1px dashed "+C.line,borderRadius:12,color:C.sub,fontSize:14}}>No clean listings matched this card. eBay may have few/no current listings for it.</div>;
  return <div>
    <div style={{fontSize:13,color:C.sub,marginBottom:12}}>Live eBay prices, separated by grade — so a PSA 10 isn't blended with a raw copy.</div>
    <div style={{border:"1px solid "+C.line,borderRadius:12,overflow:"hidden"}}>
      <div style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr 0.7fr",background:C.panel,borderBottom:"1px solid "+C.line,fontSize:11,color:C.mute,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600}}>
        <div style={{padding:"10px 14px"}}>Grade</div><div style={{padding:"10px 14px",textAlign:"right"}}>Median</div><div style={{padding:"10px 14px",textAlign:"right"}}>Low</div><div style={{padding:"10px 14px",textAlign:"right"}}>High</div><div style={{padding:"10px 14px",textAlign:"right"}}>#</div>
      </div>
      {bg.map((row,i)=><div key={i} style={{display:"grid",gridTemplateColumns:"1.2fr 1fr 1fr 1fr 0.7fr",borderTop:i?"1px solid "+C.line:"none",alignItems:"center"}}>
        <div style={{padding:"11px 14px",fontWeight:600,fontSize:14,color:row.grade==="Raw"?C.ink:(row.grade.indexOf("10")>-1?C.up:C.gold)}}>{row.grade}</div>
        <div className="mono" style={{padding:"11px 14px",textAlign:"right",fontWeight:600}}>{money(row.median,row.currency==="GBP"?"GBP":"USD")}</div>
        <div className="mono" style={{padding:"11px 14px",textAlign:"right",color:C.sub}}>{money(row.low,row.currency==="GBP"?"GBP":"USD")}</div>
        <div className="mono" style={{padding:"11px 14px",textAlign:"right",color:C.sub}}>{money(row.high,row.currency==="GBP"?"GBP":"USD")}</div>
        <div className="mono" style={{padding:"11px 14px",textAlign:"right",color:C.mute}}>{row.count}</div>
      </div>)}
    </div>
    <div style={{fontSize:11,color:C.mute,marginTop:10}}>Median shown (resistant to outliers). Grades detected from listing titles; "Graded (other)" = grader/grade not clearly stated.</div>
  </div>;
}

function ListingsTab({pricing,loadingP}){
  const list=(pricing&&pricing.listings)||[];
  if(loadingP)return <div style={{padding:"40px",textAlign:"center",color:C.sub}}>Loading current eBay listings…</div>;
  if(!list.length)return <div style={{padding:"40px 24px",textAlign:"center",border:"1px dashed "+C.line,borderRadius:12,color:C.sub,fontSize:14}}>No current listings found for this card + grade. Try a different grade, or check the price API is connected.</div>;
  return <div style={{border:"1px solid "+C.line,borderRadius:12,overflow:"hidden"}}>
    <div style={{padding:"11px 16px",background:C.panel,borderBottom:"1px solid "+C.line,fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600}}>Live on eBay now · {list.length} listings</div>
    {list.map((it,i)=><a key={i} href={it.url} target="_blank" rel="noreferrer" className="row" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderTop:i?"1px solid "+C.line:"none",textDecoration:"none",color:C.ink}}>
      {it.image&&<img src={it.image} alt="" style={{width:34,height:34,borderRadius:5,objectFit:"cover",flexShrink:0}}/>}
      <span style={{flex:1,minWidth:0}}><span style={{display:"block",fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.title}</span><span style={{fontSize:12,color:C.mute}}>{it.condition} · {it.seller||""}</span></span>
      <span className="mono" style={{fontSize:15,fontWeight:600,flexShrink:0}}>{money(it.price,it.currency==="GBP"?"GBP":"USD")}</span>
    </a>)}
  </div>;
}
function SoldTab({sold,loadingS}){
  if(loadingS)return <div style={{padding:"40px",textAlign:"center",color:C.sub}}>Loading sold history…</div>;
  if(sold&&sold.available===false)return <div style={{padding:"40px 24px",textAlign:"center",border:"1px dashed "+C.line,borderRadius:12}}><div style={{fontSize:26,marginBottom:10,opacity:0.5}}>◐</div><div style={{fontSize:15,fontWeight:600,marginBottom:6}}>Sold history not available yet</div><div style={{fontSize:13,color:C.sub,maxWidth:400,margin:"0 auto",lineHeight:1.5}}>Real sold prices come from eBay's Marketplace Insights API, which needs separate approval on your eBay keyset. Once granted, completed sales appear here automatically — no other change needed.</div></div>;
  const list=(sold&&sold.sold)||[];
  if(!list.length)return <div style={{padding:"40px 24px",textAlign:"center",border:"1px dashed "+C.line,borderRadius:12,color:C.sub,fontSize:14}}>No recent sold records found for this card + grade.</div>;
  const st=sold.stats;
  return <div>
    {st&&<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(120px,1fr))",gap:1,background:C.line,border:"1px solid "+C.line,borderRadius:12,overflow:"hidden",marginBottom:14}}>{[["Avg sold",st.avg],["Lowest",st.low],["Highest",st.high],["Sales",st.count]].map(([l,v],i)=><div key={i} style={{background:C.panel,padding:"13px 15px"}}><div style={{fontSize:12,color:C.mute,marginBottom:4}}>{l}</div><div className="mono" style={{fontSize:16,fontWeight:600}}>{l==="Sales"?v:money(v,st.currency==="GBP"?"GBP":"USD")}</div></div>)}</div>}
    <div style={{border:"1px solid "+C.line,borderRadius:12,overflow:"hidden"}}>
      <div style={{padding:"11px 16px",background:C.panel,borderBottom:"1px solid "+C.line,fontSize:11,color:C.sub,textTransform:"uppercase",letterSpacing:"0.05em",fontWeight:600}}>Recent eBay sales</div>
      {list.map((it,i)=><a key={i} href={it.url||"#"} target="_blank" rel="noreferrer" className="row" style={{display:"flex",alignItems:"center",gap:12,padding:"12px 16px",borderTop:i?"1px solid "+C.line:"none",textDecoration:"none",color:C.ink}}>
        <span style={{fontSize:12,color:C.mute,flexShrink:0,width:84}}>{it.date?new Date(it.date).toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"2-digit"}):""}</span>
        <span style={{flex:1,minWidth:0,fontSize:13,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{it.title}</span>
        <span className="mono" style={{fontSize:15,fontWeight:600,color:C.up,flexShrink:0}}>{money(it.price,it.currency==="GBP"?"GBP":"USD")}</span>
      </a>)}
    </div>
  </div>;
}

function ChartTab({hist,grade,setGrade}){
  const W=640,H=180;const vals=hist.map(p=>p.v);const hi=Math.max(...vals),lo=Math.min(...vals);
  const X=i=>(i/(hist.length-1))*W,Y=v=>H-((v-lo)/(hi-lo||1))*H;
  const d=hist.map((p,i)=>(i?"L":"M")+X(i).toFixed(1)+","+Y(p.v).toFixed(1)).join(" ");
  return (<div>
    <div style={{display:"flex",gap:7,marginBottom:14,flexWrap:"wrap"}}>{GRADES.map(g=><button key={g} onClick={()=>setGrade(g)} style={{padding:"6px 12px",borderRadius:8,fontSize:13,fontWeight:500,cursor:"pointer",border:"1px solid "+(grade===g?C.accent:C.line),background:grade===g?C.accent+"1a":C.panel,color:grade===g?C.accent:C.sub}}>{g}</button>)}</div>
    <div style={{border:"1px solid "+C.line,borderRadius:12,padding:22,background:C.panel,position:"relative"}}>
      <div style={{fontWeight:600,fontSize:15}}>Price history</div>
      <div style={{fontSize:12,color:C.gold,marginBottom:14}}>Shape shown for structure — real prices load when feeds connect</div>
      <svg viewBox={"-10 -10 "+(W+20)+" "+(H+30)} style={{width:"100%",opacity:0.4}}>{[0,.5,1].map(t=><line key={t} x1={0} y1={t*H} x2={W} y2={t*H} stroke={C.line} strokeWidth={0.6}/>)}<path d={d} fill="none" stroke={C.mute} strokeWidth={2} strokeDasharray="5 5"/></svg>
      <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}><span style={{background:C.bg,border:"1px solid "+C.line,borderRadius:8,padding:"8px 16px",fontSize:13,color:C.sub}}>Awaiting price feed</span></div>
    </div>
  </div>);
}

function Watchlist({hold,cur,open,remove,setView}){
  return (<div className="pad" style={{padding:"26px 24px"}}>
    <h1 style={{fontSize:27,fontWeight:800,margin:"0 0 18px",letterSpacing:"-0.6px"}}>Watchlist</h1>
    {hold.length===0?<div style={{padding:"50px 24px",textAlign:"center",color:C.sub,fontSize:14,border:"1px dashed "+C.line,borderRadius:12}}>No cards yet. Add buys from the <button onClick={()=>setView("dashboard")} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14,padding:0,fontWeight:600}}>Dashboard</button> or <button onClick={()=>setView("screener")} style={{background:"none",border:"none",color:C.accent,cursor:"pointer",fontSize:14,padding:0,fontWeight:600}}>Screener</button>.</div>:
      <Table head={["Card","Set","S","M","L","Price",""]} rightCols={[2,3,4,5,6]}>{hold.map(c=><tr key={c.id} className="row"><TD onClick={()=>open(c)} style={{cursor:"pointer"}}><CardCell c={c}/></TD><TD mute>{c.setCode}</TD><TD right><ScorePill v={c.score.short} tone={C.short}/></TD><TD right><ScorePill v={c.score.med} tone={C.med}/></TD><TD right><ScorePill v={c.score.long} tone={C.long}/></TD><TD right mono style={{color:C.mute}}>{money(null,cur)}</TD><TD right><span onClick={()=>remove(c.id)} style={{color:C.down,cursor:"pointer",fontSize:13}}>✕</span></TD></tr>)}</Table>}
  </div>);
}

function GridCard({c,cur,open}){return (<div className="lift" onClick={open} style={{border:"1px solid "+C.line,borderRadius:12,overflow:"hidden",background:C.panel,cursor:"pointer"}}>
  <div style={{aspectRatio:"5/7",background:C.bg,position:"relative",borderBottom:"1px solid "+C.line}}><CardImg card={c} style={{width:"100%",height:"100%"}} contain/><span style={{position:"absolute",top:8,left:8,fontSize:10,fontWeight:700,color:RARITY[c.rarity]||C.mute,background:C.bg+"e6",padding:"2px 7px",borderRadius:5,border:"1px solid "+(RARITY[c.rarity]||C.mute)+"55"}}>{c.rarity}</span><span className="mono" style={{position:"absolute",top:8,right:8,fontSize:11,fontWeight:800,color:"#06121a",background:C.long,padding:"2px 7px",borderRadius:20}}>L {c.score.long}</span></div>
  <div style={{padding:"10px 12px 12px"}}><div style={{fontSize:13,fontWeight:600,lineHeight:1.25,minHeight:33,display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical",overflow:"hidden"}}>{c.name}</div><div style={{fontSize:11,color:C.mute,marginTop:4}}>{c.id}</div><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginTop:8}}><span style={{fontSize:11,fontWeight:700,color:ratingColor(c.score.long)}}>{rating(c.score.long)}</span><span className="mono" style={{fontSize:12,color:C.mute}}>{money(null,cur)}</span></div></div>
</div>);}
function CardCell({c}){return <span style={{display:"flex",alignItems:"center",gap:10}}><span style={{width:26,height:36,borderRadius:4,overflow:"hidden",flexShrink:0,background:C.bg}}><CardImg card={c} style={{width:"100%",height:"100%"}}/></span><span style={{display:"flex",flexDirection:"column"}}><span style={{fontWeight:500}}>{c.name}</span><span style={{color:C.mute,fontSize:12}}>{c.id} · {c.rarity}</span></span></span>;}
function SearchField({value,onChange,placeholder}){return <div style={{position:"relative",maxWidth:560}}><span style={{position:"absolute",left:14,top:"50%",transform:"translateY(-50%)",color:C.mute,fontSize:15}}>⌕</span><input value={value} onChange={e=>onChange(e.target.value)} placeholder={placeholder} style={{width:"100%",background:C.panel,border:"1px solid "+C.line,borderRadius:10,padding:"12px 14px 12px 40px",color:C.ink,fontSize:15,outline:"none"}}/></div>;}
function Table({children,head,rightCols=[]}){return <div style={{border:"1px solid "+C.line,borderRadius:12,overflow:"hidden"}}><div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse"}}><thead><tr>{head.map((h,i)=><th key={i} style={{textAlign:rightCols.includes(i)?"right":"left",padding:"11px 14px",fontSize:11,fontWeight:600,color:C.mute,textTransform:"uppercase",letterSpacing:"0.05em",borderBottom:"1px solid "+C.line,background:C.panel,whiteSpace:"nowrap"}}>{h}</th>)}</tr></thead><tbody>{children}</tbody></table></div></div>;}
function TD({children,right,mute,mono,style,onClick}){return <td onClick={onClick} className={mono?"mono":""} style={{textAlign:right?"right":"left",padding:"11px 14px",fontSize:14,color:mute?C.sub:C.ink,borderBottom:"1px solid "+C.line,...(style||{})}}>{children}</td>;}
function Pill({children,c}){return <span style={{fontSize:11,fontWeight:600,color:c,background:c+"1a",padding:"3px 9px",borderRadius:5}}>{children}</span>;}
function BottomNav({view,setView}){const items=[["dashboard","Dashboard","▣"],["sets","Sets","▦"],["screener","Screener","⌖"],["watchlist","Watchlist","★"]];const map={setDetail:"sets",card:"screener"};const a=map[view]||view;return <nav className="botNav" style={{position:"fixed",bottom:0,left:0,right:0,background:C.panel,borderTop:"1px solid "+C.line,display:"none",justifyContent:"space-around",padding:"8px 0 14px",zIndex:50}}>{items.map(([k,l,icon])=><button key={k} onClick={()=>setView(k)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,flex:1,color:a===k?C.accent:C.mute}}><span style={{fontSize:17}}>{icon}</span><span style={{fontSize:11,fontWeight:a===k?600:500}}>{l}</span></button>)}</nav>;}

ReactDOM.createRoot(document.getElementById("root")).render(<ErrorBoundary><App/></ErrorBoundary>);
</script>
<script>
(function(){
  function fail(msg){ var b=document.getElementById('errbox'); if(b){b.style.display='block';b.textContent=msg;} }
  function run(){
    try{
      var src = document.getElementById('cardex-src').textContent;
      var out = Babel.transform(src, { presets: ['react'] }).code;
      var s = document.createElement('script');
      s.type = 'text/javascript';
      s.text = out;
      document.body.appendChild(s);
    }catch(e){ fail('COMPILE ERROR:\n\n'+(e.stack||e.message||e)); }
  }
  if(window.__cardexReady){
    window.__cardexReady.then(run).catch(function(e){
      fail('Failed to load React/Babel from any CDN.\nCheck your internet connection, then reload.\n\n'+(e&&e.message||e));
    });
  } else {
    fail('Loader did not initialise.');
  }
})();
</script>
</body>
</html>
